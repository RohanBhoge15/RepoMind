services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: repomind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repomind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repomind_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-repomind}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repomind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - repomind-network

  # Redis for caching and job queue
  redis:
    image: redis:7-alpine
    container_name: repomind-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - repomind-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: repomind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    # Qdrant image has no curl/bash; rely on start_period instead of an in-container probe.
    restart: unless-stopped
    networks:
      - repomind-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - repomind-backend:latest
    image: repomind-backend:latest
    container_name: repomind-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-repomind}:${POSTGRES_PASSWORD:-repomind_secure_password}@postgres:5432/${POSTGRES_DB:-repomind}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # GitHub OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3000/api/auth/callback/github}
      
      # AI Provider (NVIDIA NIM)
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-stepfun-ai/step-3.5-flash}

      # Security
      SECRET_KEY: ${SECRET_KEY:-}
      
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_repo_clones:/app/repo_clones
      - backend_logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - repomind-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - repomind-frontend:latest
    image: repomind-frontend:latest
    container_name: repomind-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - repomind-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: repomind-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - repomind-network

  # RQ Worker (Background Job Processor)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      cache_from:
        - repomind-worker:latest
    image: repomind-worker:latest
    container_name: repomind-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-repomind}:${POSTGRES_PASSWORD:-repomind_secure_password}@postgres:5432/${POSTGRES_DB:-repomind}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3000/api/auth/callback/github}
      SECRET_KEY: ${SECRET_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-stepfun-ai/step-3.5-flash}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - backend_repo_clones:/app/repo_clones
      - backend_logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repomind-network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G

networks:
  repomind-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  backend_repo_clones:
    driver: local
  backend_logs:
    driver: local
  hf_cache:
    driver: local
